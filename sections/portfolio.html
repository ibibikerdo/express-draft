<!-- portfolio.css bu section'a özel stilleri yükler -->
<link rel="stylesheet" href="assets/css/portfolio.css">

<!-- ===== PORTFOLIO / WORK ===== -->
<section id="work" class="work">
    <div class="container">
        <h2 class="section-title fade-in">Projelerimiz</h2>
        <p class="section-subtitle fade-in">Cephe tasarımı ve 3D görselleştirme projelerimizden örnekler</p>

        <div class="portfolio-grid" id="portfolioGrid">
            <!-- JS tarafından dinamik olarak doldurulur -->
        </div>

        <!-- İlerleme çubuğu (auto-slide zamanlayıcı) -->
        <div class="portfolio-progress">
            <div class="portfolio-progress-bar"></div>
        </div>

        <!-- Sayfalama Kontrolleri -->
        <div class="portfolio-nav">
            <button class="portfolio-nav-btn" id="portfolioPrev" aria-label="Önceki sayfa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                Önceki
            </button>
            <span class="portfolio-page-info" id="portfolioPageInfo">1 / 1</span>
            <button class="portfolio-nav-btn" id="portfolioNext" aria-label="Sonraki sayfa">
                İleri
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </button>
        </div>
    </div>
</section>
