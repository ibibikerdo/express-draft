<link rel="stylesheet" href="./portfolio/portfolio.css" />

<!-- ===== PORTFOLIO / WORK ===== -->
<section id="work" class="work">
  <div class="container">

    <!-- Başlık -->
    <div class="work-header-block">
      <div class="work-header-left">
        <span class="work-eyebrow">
          <span class="work-eyebrow-line"></span>
          Referanslar
        </span>
        <h2 class="work-title">Projelerimiz</h2>
      </div>
      <p class="work-subtitle">Cephe tasarımı ve 3D görselleştirme projelerimizden örnekler</p>
    </div>

    <!-- Grid — JS tarafından doldurulur -->
    <div class="portfolio-grid" id="portfolioGrid"></div>

    <!-- İlerleme çubuğu -->
    <div class="portfolio-progress">
      <div class="portfolio-progress-bar"></div>
    </div>

    <!-- Sayfalama -->
    <div class="portfolio-nav">
      <button class="portfolio-nav-btn" id="portfolioPrev" aria-label="Önceki sayfa">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Önceki</span>
      </button>

      <span class="portfolio-page-info" id="portfolioPageInfo">1 / 1</span>

      <button class="portfolio-nav-btn" id="portfolioNext" aria-label="Sonraki sayfa">
        <span>İleri</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>

  </div>
</section>
