<link rel="stylesheet" href="./contact.css" />

<section id="contact" class="contact">
  <div class="container">
    <h2 class="section-title fade-in">İletişime Geçin</h2>
    <p class="section-subtitle fade-in">Birlikte harika şeyler yaratalım</p>

    <div class="contact-content">
      <form class="contact-form fade-in">
        <div class="form-group">
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Adınız"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="E-posta Adresiniz"
            required
          />
        </div>
        <div class="form-group">
          <textarea
            id="message"
            name="message"
            placeholder="Mesajınız"
            rows="5"
            required
          ></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Mesaj Gönder</button>
      </form>

      <div class="contact-info fade-in">
        <div class="social-links">
          <a href="#" class="social-link" aria-label="Instagram">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </a>
          <a href="#" class="social-link" aria-label="LinkedIn">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
              ></path>
              <rect x="2" y="9" width="4" height="12"></rect>
              <circle cx="4" cy="4" r="2"></circle>
            </svg>
          </a>
          <a href="#" class="social-link" aria-label="Behance">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M22 7h-7M15 12h7M22 17h-7M2 7h6a3 3 0 0 1 0 6H2V7zM2 13h6.5a3.5 3.5 0 0 1 0 7H2v-7z"
              ></path>
            </svg>
          </a>
          <a href="#" class="social-link" aria-label="Dribbble">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <path
                d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"
              ></path>
            </svg>
          </a>
        </div>
        <p class="contact-email">erdoganntvn@outlook.com</p>
      </div>
    </div>
  </div>
</section>
