<link rel="stylesheet" href="./contact/contact.css" />

<!-- ===== İLETİŞİM ===== -->
<section id="contact" class="contact">
  <div class="container">

    <!-- Başlık — diğer section'larla birebir aynı dil -->
    <div class="contact-header-block">
      <div class="contact-header-left">
        <span class="contact-eyebrow">
          <span class="contact-eyebrow-line"></span>
          İletişim
        </span>
        <h2 class="contact-title">Teklif Alın</h2>
      </div>
      <p class="contact-header-subtitle">
        Projenizi paylaşın,<br />24 saat içinde size dönelim.
      </p>
    </div>

    <!-- Ana grid -->
    <div class="contact-wrapper">

      <!-- ===== Sol Panel ===== -->
      <div class="contact-left">
        <div>
          <h3 class="contact-heading">
            <span class="contact-heading-main">Projenizi<br />Başlatalım</span>
            <span class="contact-heading-sub">
              Hayalinizdeki mimari projeyi birlikte hayata geçirelim.
              Fikirlerinizi paylaşın, size özel teklif hazırlayalım.
            </span>
          </h3>
        </div>

        <div>
          <div class="contact-info-list">
            <div class="contact-info-item">
              <div class="contact-info-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M2 7l10 7 10-7"/>
                </svg>
              </div>
              <a href="mailto:exprescizim@gmail.com" class="contact-info-text">
                exprescizim@gmail.com
              </a>
            </div>

            <div class="contact-info-item">
              <div class="contact-info-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.29h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.18 6.18l.95-.95a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
              </div>
              <a
                href="https://wa.me/905061719930"
                class="contact-info-text"
                target="_blank"
                rel="noopener noreferrer"
              >
                +90 506 171 99 30
              </a>
            </div>
          </div>

          <!-- Sosyal medya -->
          <div class="contact-socials">
            <a href="#" class="contact-social-link" aria-label="Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
              </svg>
            </a>
            <a href="#" class="contact-social-link" aria-label="LinkedIn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                <rect x="2" y="9" width="4" height="12"/>
                <circle cx="4" cy="4" r="2"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
      <!-- /contact-left -->

      <!-- ===== Sağ Panel — Form ===== -->
      <div class="contact-right">
        <div class="contact-form-inner">
          <form class="contact-form" novalidate>

            <!-- Ad / Soyad yan yana -->
            <div class="form-row">
              <div class="form-group">
                <label for="first-name">Ad</label>
                <input
                  type="text"
                  id="first-name"
                  name="firstName"
                  placeholder="Adınız"
                  required
                />
              </div>
              <div class="form-group">
                <label for="last-name">Soyad</label>
                <input
                  type="text"
                  id="last-name"
                  name="lastName"
                  placeholder="Soyadınız"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="email">E-posta</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="ornek@mail.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="message">Proje Özeti</label>
              <textarea
                id="message"
                name="message"
                placeholder="Projeniz hakkında kısaca bilgi verin..."
                rows="4"
                required
              ></textarea>
            </div>

            <!-- Submit — tam genişlik, soldan sağa gold kayma -->
            <button type="submit" class="contact-submit">
              <div class="contact-submit-fill" aria-hidden="true"></div>
              <span class="contact-submit-text">Teklif Gönder</span>
              <span class="contact-submit-arrow">→</span>
            </button>

          </form>
        </div>
      </div>
      <!-- /contact-right -->

    </div>
    <!-- /contact-wrapper -->

  </div>
</section>
